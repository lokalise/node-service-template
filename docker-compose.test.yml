# Override for docker-healthcheck-test: remove host port bindings
# to avoid conflicts with a running dev compose stack.
# The app container reaches services via the Docker network.
services:
  postgres:
    ports: !override []
  redis:
    ports: !override []
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a sOmE_sEcUrE_pAsS ping | grep PONG"]
      interval: 2s
      timeout: 5s
      retries: 10
  rabbitmq:
    ports: !override []
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics check_port_connectivity || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 15s
  fauxqs:
    ports: !override []
