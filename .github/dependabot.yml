version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
      # Open PRs inside the automerge window (see ci.yml) so they are not skipped.
      time: '10:00'
      timezone: 'Europe/Berlin'
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7

  - package-ecosystem: 'npm'
    directories:
      - '/'
      - '/packages/*'
    schedule:
      interval: 'weekly'
      # Open PRs inside the automerge window (see ci.yml) so they are not skipped.
      time: '10:00'
      timezone: 'Europe/Berlin'
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    groups:
      types:
        patterns:
          - '@types/*'
      vitest:
        patterns:
          - 'vitest'
          - '@vitest/*'
      typescript:
        patterns:
          - 'typescript'
      fastify:
        patterns:
          - '@fastify/*'
          - 'fastify'
          - 'fastify-*'
      message-queue-toolkit:
        patterns:
          - '@message-queue-toolkit/*'
      drizzle:
        patterns:
          - 'drizzle-*'
      awilix:
        patterns:
          - 'awilix'
          - 'awilix-*'
      aws:
        patterns:
          - '@aws-sdk/*'
      rollup:
        patterns:
          - '@rollup/*'
      esbuild:
        patterns:
          - '@esbuild/*'
      biomejs:
        patterns:
          - '@biomejs/*'
