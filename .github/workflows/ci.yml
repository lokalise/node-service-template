name: ci

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.17, 26.x]

    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install
        run: |
          pnpm install --frozen-lockfile --ignore-scripts

      - name: Docker start
        run: |
          docker compose up -d --quiet-pull --wait

      - name: Build TS
        run: |
          pnpm run build

      - name: Schema preparation
        run: |
          pnpm run copy:config
          pnpm run db:apply-migrations

      - name: Run Tests
        run: |
          pnpm run test:ci

      - name: Run lint
        run: |
          pnpm run lint

      - name: DB stop
        run: |
          docker compose down


  automerge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: fastify/github-action-merge-dependabot@v3.14.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Only auto-merge during business hours: Mon-Fri, 10:00-16:59 Berlin time.
          # Conservative window so a human is around across common European timezones
          # when a merge lands (10:00 Berlin = 09:00 London; 16:59 Berlin = 17:59 Helsinki).
          merge-window: '* 10-16 * * 1-5'
          merge-window-timezone: 'Europe/Berlin'
