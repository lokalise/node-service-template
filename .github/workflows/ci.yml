name: ci

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install
        run: |
          pnpm install --frozen-lockfile --ignore-scripts

      - name: Docker start
        run: |
          docker compose up -d --quiet-pull --wait

      - name: Build TS
        run: |
          pnpm run build

      - name: Schema preparation
        run: |
          pnpm run copy:config
          pnpm run db:apply-migrations

      - name: Run Tests
        run: |
          pnpm run test:ci

      - name: Run lint
        run: |
          pnpm run lint

      - name: Smoketest the application
        run: |
          pnpm run start:prod:smoke-test

      - name: DB stop
        run: |
          docker compose down


  automerge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: fastify/github-action-merge-dependabot@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
